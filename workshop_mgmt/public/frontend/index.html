<!DOCTYPE html>
<html lang="en">
<head>
	<script>
		(function () {
			try {
				var t = localStorage.getItem("workshop-portal-theme");
				document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
			} catch (e) {
				document.documentElement.setAttribute("data-theme", "dark");
			}
		})();
	</script>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap"
		rel="stylesheet"
	/>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Workshop Portal</title>
  <script type="module" crossorigin src="/assets/workshop_mgmt/frontend/assets/index-DkI9hz1J.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/workshop_mgmt/frontend/assets/index-BQSRau3e.css">
</head>
<body>
	<div id="app"></div>
	{% if boot %}
	<script>
		window.frappe = {};
		window.frappe.boot = {{ boot | safe }};
		window.frappe.csrf_token = "{{ csrf_token }}";
	</script>
	{% endif %}
</body>
</html>
